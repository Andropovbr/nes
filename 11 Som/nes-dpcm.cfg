SYMBOLS { __STACKSIZE__: type = weak, value = $0300; }
MEMORY {
    ZP: file = "", start = $0002, size = $001A, type = rw, define = yes;
    HEADER: file = %O, start = $0000, size = $0010, fill = yes;
    ROMLO: file = %O, start = $8000, size = $4000, fill = yes, define = yes;
    DMC: file = %O, start = $C000, size = $00C0, fill = yes;
    ROMHI: file = %O, start = $C0C0, size = $3F3A, fill = yes, define = yes;
    ROMV: file = %O, start = $FFFA, size = $0006, fill = yes;
    ROM2: file = %O, start = $0000, size = $2000, fill = yes;
    SRAM: file = "", start = $0500, size = __STACKSIZE__, define = yes;
    RAM: file = "", start = $6000, size = $2000, define = yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP, type = zp;
    HEADER: load = HEADER, type = ro;
    STARTUP: load = ROMLO, type = ro, define = yes;
    LOWCODE: load = ROMLO, type = ro, optional = yes;
    ONCE: load = ROMLO, type = ro, optional = yes;
    CODE: load = ROMLO, type = ro, define = yes;
    RODATA: load = ROMLO, type = ro, define = yes;
    DPCM: load = DMC, type = ro;
    DATA: load = ROMHI, run = RAM, type = rw, define = yes;
    VECTORS: load = ROMV, type = rw;
    CHARS: load = ROM2, type = rw;
    BSS: load = RAM, type = bss, define = yes;
}
